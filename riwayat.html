<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Riwayat Absensi</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --primary:#2563eb;
  --primary2:#1d4ed8;

  --success:#16a34a;
  --danger:#dc2626;
  --warning:#f59e0b;

  --bg:#eef4ff;

  --card:rgba(255,255,255,.88);

  --text:#0f172a;
  --muted:#64748b;

  --border:#dbeafe;

}

body{

  font-family:
  'Inter',
  sans-serif;

  background:
  linear-gradient(
    180deg,
    #edf4ff 0%,
    #f8fbff 100%
  );

  color:var(--text);

  min-height:100vh;

  padding:24px;

}

.container{

  max-width:1700px;
  margin:auto;

}

/* ===================================
HEADER
=================================== */

.header{

  background:
  linear-gradient(
    135deg,
    #1e3a8a,
    #2563eb
  );

  color:#fff;

  padding:40px;

  border-radius:34px;

  margin-bottom:28px;

  box-shadow:
  0 20px 45px
  rgba(37,99,235,.25);

}

.header-top{

  display:flex;

  justify-content:
  space-between;

  align-items:center;

  flex-wrap:wrap;

  gap:20px;

}

.header h1{

  font-size:42px;

  font-weight:800;

  letter-spacing:-1px;

  margin-bottom:10px;

}

.header p{

  opacity:.92;

  font-size:17px;

}

.header-badge{

  background:
  rgba(255,255,255,.14);

  border:
  1px solid rgba(255,255,255,.18);

  backdrop-filter:
  blur(14px);

  padding:16px 22px;

  border-radius:20px;

  font-size:15px;

  font-weight:700;

}

/* ===================================
CARD
=================================== */

.card{

  background:
  var(--card);

  backdrop-filter:
  blur(16px);

  border:
  1px solid rgba(255,255,255,.8);

  border-radius:30px;

  padding:28px;

  margin-bottom:24px;

  box-shadow:
  0 15px 35px
  rgba(15,23,42,.06);

}

/* ===================================
FILTER
=================================== */

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(240px,1fr)
  );

  gap:20px;

}

.form-group{

  display:flex;
  flex-direction:column;

}

.form-group label{

  font-size:14px;

  font-weight:800;

  margin-bottom:10px;

  color:#1e293b;

}

.form-group input,
.form-group select{

  border:
  1px solid #dbeafe;

  background:#fff;

  border-radius:18px;

  padding:16px 18px;

  font-size:15px;

  outline:none;

}

.form-group input:focus,
.form-group select:focus{

  border-color:#2563eb;

  box-shadow:
  0 0 0 5px
  rgba(37,99,235,.12);

}

/* ===================================
BUTTON
=================================== */

.action{

  margin-top:24px;

  display:flex;

  gap:14px;

  flex-wrap:wrap;

}

.btn{

  border:none;

  padding:15px 22px;

  border-radius:18px;

  font-size:14px;

  font-weight:800;

  cursor:pointer;

  transition:.2s;

}

.btn:hover{

  transform:translateY(-2px);

}

.btn-primary{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

  color:#fff;

  box-shadow:
  0 12px 24px
  rgba(37,99,235,.2);

}

.btn-success{

  background:
  linear-gradient(
    135deg,
    #16a34a,
    #15803d
  );

  color:#fff;

}

.btn-danger{

  background:
  linear-gradient(
    135deg,
    #dc2626,
    #b91c1c
  );

  color:#fff;

}

/* ===================================
TABLE
=================================== */

.table-wrap{

  overflow:auto;

  border-radius:24px;

  border:
  1px solid #dbeafe;

}

table{

  width:100%;

  min-width:1300px;

  border-collapse:
  collapse;

}

thead{

  background:#eff6ff;

}

th{

  padding:18px;

  font-size:13px;

  color:#1e3a8a;

  font-weight:800;

  text-align:center;

}

td{

  padding:16px;

  border-top:
  1px solid #edf2ff;

  text-align:center;

  font-size:14px;

}

tbody tr:hover td{

  background:#f8fbff;

}

.kelas-divider td{

  background:
  linear-gradient(
    135deg,
    #dbeafe,
    #eff6ff
  ) !important;

  padding:20px;

}

.kelas-title{

  font-size:20px;

  font-weight:800;

  color:#1e3a8a;

  text-align:left;

}

/* ===================================
BADGE
=================================== */

.badge{

  display:inline-flex;

  align-items:center;

  justify-content:center;

  padding:8px 14px;

  border-radius:999px;

  font-size:12px;

  font-weight:800;

}

.badge-success{

  background:#dcfce7;

  color:#166534;

}

.badge-warning{

  background:#fef3c7;

  color:#92400e;

}

.badge-danger{

  background:#fee2e2;

  color:#991b1b;

}

/* ===================================
MODAL
=================================== */

.modal{

  position:fixed;

  inset:0;

  background:
  rgba(15,23,42,.55);

  backdrop-filter:
  blur(8px);

  display:none;

  align-items:center;

  justify-content:center;

  padding:24px;

  z-index:999;

}

.modal-content{

  background:#fff;

  width:100%;

  max-width:1100px;

  max-height:90vh;

  overflow:auto;

  border-radius:30px;

  padding:28px;

  box-shadow:
  0 25px 60px
  rgba(0,0,0,.2);

}

.modal-header{

  display:flex;

  justify-content:
  space-between;

  align-items:center;

  margin-bottom:24px;

}

.modal-header h2{

  font-size:30px;

  font-weight:800;

}

.modal-close{

  border:none;

  background:#ef4444;

  color:#fff;

  padding:12px 16px;

  border-radius:14px;

  font-weight:800;

  cursor:pointer;

}

/* ===================================
DETAIL
=================================== */

.detail-table{

  width:100%;

  border-collapse:
  collapse;

  margin-top:20px;

}

.detail-table th{

  background:#eff6ff;

}

.detail-table th,
.detail-table td{

  border:
  1px solid #e2e8f0;

  padding:14px;

  text-align:center;

}

.info-box{

  background:#f8fbff;

  border:
  1px solid #dbeafe;

  border-radius:22px;

  padding:22px;

  line-height:2;

  margin-bottom:24px;

}

.info-box h3{

  font-size:24px;

  margin-bottom:8px;

}

/* ===================================
STATE
=================================== */

.loading,
.empty{

  padding:30px;

  text-align:center;

  font-weight:700;

}

.loading{

  color:#2563eb;

}

.empty{

  color:#64748b;

}

.jam-row td{

  background:#eff6ff !important;

  color:#1d4ed8;

  font-weight:800;

}

.siswa-row:hover td{

  background:#f8fbff;

}

input[type="radio"]{

  width:18px;
  height:18px;

  cursor:pointer;

}

/* ===================================
RESPONSIVE
=================================== */

@media(max-width:768px){

  body{
    padding:14px;
  }

  .header{
    padding:28px;
    border-radius:26px;
  }

  .header h1{
    font-size:30px;
  }

  .card{
    padding:22px;
    border-radius:24px;
  }

  .modal-content{
    padding:22px;
    border-radius:24px;
  }

}

</style>

</head>

<body>

<div class="container">

<!-- ===================================
HEADER
=================================== -->

<div class="header">

  <div class="header-top">

    <div>

      <h1>
        RIWAYAT ABSENSI
      </h1>

      <p>
        Monitoring & Manajemen Data Absensi Sekolah
      </p>

    </div>

    <div class="header-badge">

      📊 Realtime Monitoring System

    </div>

  </div>

</div>

<!-- ===================================
FILTER
=================================== -->

<div class="card">

  <div class="form-grid">

    <div class="form-group">

      <label>Tanggal</label>

      <input
        type="date"
        id="tanggal"
      >

    </div>

    <div class="form-group">

      <label>Kelas</label>

      <select id="kelas">

        <option value="">
          Semua Kelas
        </option>

      </select>

    </div>

  </div>

  <div class="action">

    <button
      id="btnCari"
      class="btn btn-primary"
    >
      🔍 Cari Riwayat
    </button>

  </div>

</div>

<!-- ===================================
TABLE
=================================== -->

<div class="card">

  <div class="table-wrap">

    <table>

      <thead>

        <tr>

          <th>No</th>
          <th>Tanggal</th>
          <th>Kelas</th>
          <th>Mapel</th>
          <th>Guru</th>
          <th>Jam</th>
          <th>Foto</th>
          <th>Detail</th>
          <th>Edit</th>
          <th>Hapus</th>

        </tr>

      </thead>

      <tbody id="tbodyRiwayat">

        <tr>

          <td colspan="10">
            Belum ada data
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>

</div>

<!-- ===================================
MODAL DETAIL
=================================== -->

<div
  id="modalDetail"
  class="modal"
>

  <div class="modal-content">

    <div class="modal-header">

      <h2>
        Detail Absensi
      </h2>

      <button
        id="btnCloseModal"
        class="modal-close"
      >
        Tutup
      </button>

    </div>

    <div id="detailContent"></div>

  </div>

</div>

<!-- ===================================
MODAL EDIT
=================================== -->

<div
  id="modalEdit"
  class="modal"
>

  <div class="modal-content">

    <div class="modal-header">

      <h2>
        Edit Absensi
      </h2>

      <button
        id="btnCloseEdit"
        class="modal-close"
      >
        Tutup
      </button>

    </div>

    <table class="detail-table">

      <thead>

        <tr>

          <th>No</th>
          <th>NISN</th>
          <th>Nama</th>
          <th>H</th>
          <th>S</th>
          <th>I</th>
          <th>A</th>
          <th>C</th>

        </tr>

      </thead>

      <tbody id="tbodyEdit"></tbody>

    </table>

    <br>

    <button
      id="btnUpdateAbsensi"
      class="btn btn-primary"
    >
      💾 Simpan Perubahan
    </button>

  </div>

</div>

<script>

// ======================================
// API
// ======================================

const API_URL =
  "https://script.google.com/macros/s/AKfycbw_6HNjl9sS8PqlDvOwnlUCEc5ZOgBbEXjOT2KgGlMsoAWcUqOMSS6U5rrD6-CSmvs/exec";

// ======================================
// ELEMENT
// ======================================

const elTanggal =
  document.getElementById(
    "tanggal"
  );

const elKelas =
  document.getElementById(
    "kelas"
  );

const btnCari =
  document.getElementById(
    "btnCari"
  );

const tbodyRiwayat =
  document.getElementById(
    "tbodyRiwayat"
  );

const modalDetail =
  document.getElementById(
    "modalDetail"
  );

const detailContent =
  document.getElementById(
    "detailContent"
  );

const modalEdit =
  document.getElementById(
    "modalEdit"
  );

const tbodyEdit =
  document.getElementById(
    "tbodyEdit"
  );

// ======================================
// GLOBAL
// ======================================

let EDIT_ID = "";
let EDIT_DETAIL = [];

elTanggal.value =
  new Date()
  .toISOString()
  .split("T")[0];

// ======================================
// FETCH GET
// ======================================

async function fetchGet(url){

  const response =
    await fetch(

      url +

      (url.includes("?")
        ? "&"
        : "?")

      + "_=" +

      Date.now()

    );

  return await response.json();

}

// ======================================
// FETCH POST
// ======================================

async function fetchPost(data){

  const response = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(data)
  });

  return await response.json();

}

// ======================================
// OPTION
// ======================================

function createOption(
  value,
  text
){

  const opt =
    document.createElement(
      "option"
    );

  opt.value = value;
  opt.textContent = text;

  return opt;

}

// ======================================
// LOAD CONFIG
// ======================================

async function loadConfig(){

  try{

    const result =
      await fetchGet(

        API_URL +
        "?action=getConfig"

      );

    if(!result.success){

      throw new Error(
        result.error
      );

    }

    elKelas.innerHTML =
      `
      <option value="">
        Semua Kelas
      </option>
      `;

    (result.kelas || [])
    .forEach(k=>{

      elKelas.appendChild(
        createOption(k,k)
      );

    });

  }catch(err){

    alert(err.message);

  }

}

// ======================================
// LOAD RIWAYAT
// ======================================

async function loadRiwayat(){

  try{

    tbodyRiwayat.innerHTML =
      `
      <tr>
        <td colspan="10" class="loading">
          Loading...
        </td>
      </tr>
      `;

    const result =
      await fetchGet(

        API_URL +
        "?action=getRiwayatAbsensi"

      );

    if(!result.success){

      throw new Error(
        result.error
      );

    }

    let data =
      result.data || [];

    if(elTanggal.value){

      data =
        data.filter(d=>

          String(d.tanggal)
          ===
          String(elTanggal.value)

        );

    }

    if(elKelas.value){

      data =
        data.filter(d=>

          String(d.kelas)
          ===
          String(elKelas.value)

        );

    }

    renderRiwayat(data);

  }catch(err){

    tbodyRiwayat.innerHTML =
      `
      <tr>
        <td colspan="10">
          ${err.message}
        </td>
      </tr>
      `;

  }

}

// ======================================
// RENDER RIWAYAT
// ======================================

function renderRiwayat(data){

  if(!data.length){

    tbodyRiwayat.innerHTML =
      `
      <tr>
        <td colspan="10" class="empty">
          Tidak ada data
        </td>
      </tr>
      `;

    return;

  }

  let html = "";

  let kelasAktif = "";

  data.forEach((item,index)=>{

    if(kelasAktif !== item.kelas){

      kelasAktif = item.kelas;

      html += `

        <tr class="kelas-divider">

          <td colspan="10">

            <div class="kelas-title">

              📘 ${kelasAktif}

            </div>

          </td>

        </tr>

      `;

    }

    html += `

      <tr>

        <td>${index+1}</td>

        <td>${item.tanggal || "-"}</td>

        <td>${item.kelas || "-"}</td>

        <td>${item.mapel || "-"}</td>

        <td>${item.guru || "-"}</td>

        <td>
          Jam ${item.jam_mulai || "-"}
          -
          ${item.jam_selesai || "-"}
        </td>

        <td>

          ${
            item.foto

            ?

            `
            <a
              href="${item.foto}"
              target="_blank"
            >
              📷 Lihat
            </a>
            `

            :

            "-"

          }

        </td>

        <td>

          <button
            class="btn btn-success"
            onclick='showDetail(${JSON.stringify(item.id)})'
          >
            Detail
          </button>

        </td>

        <td>

          <button
            class="btn btn-primary"
            onclick='openModalEdit(${JSON.stringify(item.id)})'
          >
            Edit
          </button>

        </td>

        <td>

          <button
            class="btn btn-danger"
            onclick='deleteAbsensi(${JSON.stringify(item.id)})'
          >
            Hapus
          </button>

        </td>

      </tr>

    `;

  });

  tbodyRiwayat.innerHTML = html;

}

// ======================================
// NORMALIZE ID
// ======================================

function normalizeId(id){

  if(!id){

    return "";

  }

  id = String(id).trim();

  if(id.includes("|")){

    const parts =
      id.split("|");

    return btoa(

      JSON.stringify({

        tanggal:
          parts[0] || "",

        kelas:
          parts[1] || "",

        mapel:
          parts[2] || "",

        guru:
          parts.slice(3).join("|") || ""

      })

    );

  }

  return id;

}

// ======================================
// DETAIL
// ======================================

async function showDetail(id){

  try{

    modalDetail.style.display =
      "flex";

    detailContent.innerHTML =
      `
      <div class="loading">
        Loading...
      </div>
      `;

    const safeId =
      normalizeId(id);

    const result =
      await fetchGet(

        API_URL +

        "?action=getDetailAbsensi" +

        "&id=" +

        encodeURIComponent(
          safeId
        )

      );

    if(!result.success){

      throw new Error(
        result.error
      );

    }

    const data =
      result.data;

    const groups = {};

    (data.detail || [])
    .forEach(item=>{

      const jam =
        item.jam || "-";

      if(!groups[jam]){

        groups[jam] = [];

      }

      groups[jam].push(item);

    });

    let html = `

      <div class="info-box">

        <h3>
          ${data.mapel}
        </h3>

        <p>
          👨‍🏫 ${data.guru}
        </p>

        <p>
          🏫 ${data.kelas}
        </p>

      </div>

    `;

    Object.keys(groups)
    .sort((a,b)=>Number(a)-Number(b))
    .forEach(jam=>{

      html += `

        <h3 style="
          margin:20px 0 10px;
          color:#1976d2;
        ">
          Jam Ke-${jam}
        </h3>

        <table class="detail-table">

          <thead>

            <tr>

              <th>No</th>
              <th>NISN</th>
              <th>Nama</th>
              <th>Status</th>

            </tr>

          </thead>

          <tbody>

      `;

      groups[jam]
      .forEach((s,i)=>{

        html += `

          <tr>

            <td>${i+1}</td>

            <td>${s.nisn}</td>

            <td>${s.nama_siswa}</td>

            <td>${s.status}</td>

          </tr>

        `;

      });

      html += `
          </tbody>
        </table>
      `;

    });

    detailContent.innerHTML =
      html;

  }catch(err){

    detailContent.innerHTML =
      `
      <div class="empty">
        ${err.message}
      </div>
      `;

  }

}

// ======================================
// OPEN MODAL EDIT
// ======================================

async function openModalEdit(id){

  try{

    EDIT_ID =
      normalizeId(id);

    modalEdit.style.display =
      "flex";

    tbodyEdit.innerHTML =
      `
      <tr>
        <td colspan="8" class="loading">
          Loading...
        </td>
      </tr>
      `;

    const result =
      await fetchGet(

        API_URL +
        "?action=getDetailAbsensi" +
        "&id=" +
        encodeURIComponent(
          EDIT_ID
        )

      );

    if(!result.success){

      throw new Error(
        result.error
      );

    }

    const data =
      result.data || {};

    EDIT_DETAIL =
      data.detail || [];

    renderEditTable();

  }catch(err){

    tbodyEdit.innerHTML =
      `
      <tr>
        <td colspan="8" class="empty">
          ${err.message}
        </td>
      </tr>
      `;

  }

}

// ======================================
// RADIO CELL
// ======================================

function radioCell(
  key,
  current,
  status
){

  return `

    <td>

      <input
        type="radio"
        name="s_${key}"
        value="${status}"
        ${
          current === status
          ? "checked"
          : ""
        }
      >

    </td>

  `;

}

// ======================================
// RENDER EDIT TABLE
// ======================================

function renderEditTable(){

  if(!EDIT_DETAIL.length){

    tbodyEdit.innerHTML =
      `
      <tr>
        <td colspan="8" class="empty">
          Tidak ada data
        </td>
      </tr>
      `;

    return;

  }

  const grouped = {};

  EDIT_DETAIL.forEach(item=>{

    const jam =
      item.jam ||
      item.jam_ke ||
      "Tanpa Jam";

    if(!grouped[jam]){

      grouped[jam] = [];

    }

    grouped[jam].push(item);

  });

  let html = "";

  Object.keys(grouped)
  .sort((a,b)=>Number(a)-Number(b))
  .forEach(jam=>{

    const siswaJam =
      grouped[jam];

    html += `

      <tr class="jam-row">

        <td colspan="8">

          Jam Ke-${jam}

        </td>

      </tr>

    `;

    siswaJam.forEach((s,index)=>{

      html += `

        <tr
          class="siswa-row"
          data-row="${s.rowIndex}"
        >

          <td>${index+1}</td>

          <td>${s.nisn}</td>

          <td>${s.nama_siswa}</td>

          ${radioCell(
            s.nisn + "_" + s.rowIndex,
            s.status,
            "H"
          )}

          ${radioCell(
            s.nisn + "_" + s.rowIndex,
            s.status,
            "S"
          )}

          ${radioCell(
            s.nisn + "_" + s.rowIndex,
            s.status,
            "I"
          )}

          ${radioCell(
            s.nisn + "_" + s.rowIndex,
            s.status,
            "A"
          )}

          ${radioCell(
            s.nisn + "_" + s.rowIndex,
            s.status,
            "C"
          )}

        </tr>

      `;

    });

  });

  tbodyEdit.innerHTML =
    html;

}

// ======================================
// UPDATE ABSENSI
// ======================================

async function updateAbsensi(){

  try{

    const rows =
      Array.from(

        document.querySelectorAll(
          "#tbodyEdit tr.siswa-row"
        )

      );

    const detail = [];

    rows.forEach(row=>{

      const rowIndex =
        row.dataset.row;

      const checked =
        row.querySelector(
          "input:checked"
        );

      if(!rowIndex){

        return;

      }

      detail.push({

        rowIndex:
          Number(rowIndex),

        status:
          checked
          ? checked.value
          : "H"

      });

    });

    const result =
      await fetchPost({

        action:
          "updateAbsensi",

        data:{
          detail
        }

      });

    if(!result.success){

      throw new Error(
        result.error
      );

    }

    alert(
      "Berhasil update absensi"
    );

    closeModalEdit();

    loadRiwayat();

  }catch(err){

    alert(err.message);

  }

}

// ======================================
// DELETE
// ======================================

async function deleteAbsensi(id){

  try{

    const yes =
      confirm(
        "Hapus absensi ini?"
      );

    if(!yes){

      return;

    }

    const safeId =
      normalizeId(id);

    const result =
      await fetchPost({

        action:
          "hapusAbsensi",

        id:safeId

      });

    if(!result.success){

      throw new Error(
        result.error
      );

    }

    alert(
      "Berhasil dihapus"
    );

    loadRiwayat();

  }catch(err){

    alert(err.message);

  }

}

// ======================================
// CLOSE MODAL
// ======================================

function closeModalDetail(){

  modalDetail.style.display =
    "none";

}

function closeModalEdit(){

  modalEdit.style.display =
    "none";

}

// ======================================
// EVENT
// ======================================

btnCari.addEventListener(
  "click",
  loadRiwayat
);

document
.getElementById(
  "btnCloseModal"
)
.addEventListener(
  "click",
  closeModalDetail
);

document
.getElementById(
  "btnCloseEdit"
)
.addEventListener(
  "click",
  closeModalEdit
);

document
.getElementById(
  "btnUpdateAbsensi"
)
.addEventListener(
  "click",
  updateAbsensi
);

window.addEventListener(
  "click",
  (e)=>{

    if(
      e.target === modalDetail
    ){

      closeModalDetail();

    }

    if(
      e.target === modalEdit
    ){

      closeModalEdit();

    }

  }
);

// ======================================
// INIT
// ======================================

window.addEventListener(
  "load",
  ()=>{

    loadConfig();

    loadRiwayat();

  }
);

</script>
