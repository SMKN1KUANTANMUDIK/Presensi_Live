<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Input Absensi</title>

<link
  href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

<style>

:root{

  --primary:#2563eb;
  --primary2:#1d4ed8;
  --bg:#f4f7ff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#dbe4ff;

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:
    'Plus Jakarta Sans',
    sans-serif;

  background:
    linear-gradient(
      135deg,
      #eef4ff,
      #f8fbff
    );

  color:var(--text);

  padding:18px;

  min-height:100vh;

}

.container{
  max-width:1400px;
  margin:auto;
}

/* =========================================================
TOP MENU
========================================================= */

/* =========================================================
TOP MENU
========================================================= */

.top-menu{

  display:flex;

  align-items:center;

  justify-content:space-between;

  gap:14px;

  margin-bottom:22px;

  flex-wrap:wrap;

}

.top-menu-left,
.top-menu-right{

  display:flex;

  align-items:center;

  gap:14px;

}

/* =========================================================
MENU BUTTON
========================================================= */

.menu-btn{

  text-decoration:none;

  padding:14px 26px;

  border-radius:20px;

  background:
  rgba(255,255,255,.75);

  border:1px solid rgba(255,255,255,.9);

  color:#475569;

  font-weight:800;

  font-size:15px;

  box-shadow:
  0 8px 25px rgba(15,23,42,.06);

  transition:.25s;

  backdrop-filter:blur(12px);

}

.menu-btn:hover{

  transform:translateY(-2px);

  background:#ffffff;

  color:#2563eb;

}

.menu-btn.active{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

  color:#fff;

  border-color:transparent;

  box-shadow:
  0 10px 28px rgba(37,99,235,.28);

}

/* =========================================================
LOGOUT BUTTON
========================================================= */

.logout-btn{

  border:none;

  padding:14px 24px;

  border-radius:20px;

  background:
  linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );

  color:#fff;

  font-size:14px;

  font-weight:800;

  cursor:pointer;

  transition:.25s;

  box-shadow:
  0 10px 25px rgba(239,68,68,.22);

}

.logout-btn:hover{

  transform:translateY(-2px);

  opacity:.95;

}


.header{

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #1d4ed8
    );

  border-radius:28px;

  padding:34px;

  color:#fff;

  margin-bottom:22px;

  box-shadow:
    0 20px 50px rgba(37,99,235,.25);

}

.header h1{

  font-size:34px;
  font-weight:800;
  margin-bottom:8px;

}

.header p{

  font-size:15px;
  opacity:.92;

}

.card{

  background:
    rgba(255,255,255,.82);

  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,.6);

  border-radius:28px;

  padding:26px;

  margin-bottom:22px;

  box-shadow:
    0 15px 45px rgba(15,23,42,.06);

}

.card-title{

  font-size:20px;
  font-weight:800;
  margin-bottom:22px;
  color:#0f172a;

}

.form-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

}

.form-group{

  display:flex;
  flex-direction:column;

}

.form-group label{

  margin-bottom:10px;

  font-size:14px;

  font-weight:700;

  color:#334155;

}

.input-modern,
.form-group select{

  width:100%;

  padding:15px 16px;

  border-radius:16px;

  border:1px solid var(--border);

  background:#f8fbff;

  font-size:14px;

  font-weight:600;

  color:#1e293b;

  outline:none;

  transition:.25s;

}

.input-modern:focus,
.form-group select:focus{

  border-color:var(--primary);

  background:#fff;

  box-shadow:
    0 0 0 5px rgba(37,99,235,.12);

}

.action{

  margin-top:24px;

  display:flex;
  gap:14px;
  flex-wrap:wrap;

}

.btn{

  border:none;

  padding:14px 22px;

  border-radius:16px;

  cursor:pointer;

  font-size:14px;

  font-weight:800;

  transition:.25s;

}

.btn:hover{

  transform:translateY(-2px);

}

.btn-primary{

  background:
    linear-gradient(
      135deg,
      var(--primary),
      var(--primary2)
    );

  color:#fff;

  box-shadow:
    0 12px 25px rgba(37,99,235,.24);

}

.btn-primary:disabled{

  opacity:.6;
  cursor:not-allowed;

}

.table-wrap{

  width:100%;
  overflow:auto;
  border-radius:24px;

}

table{

  width:100%;
  min-width:950px;

  border-collapse:collapse;

  overflow:hidden;

}

th{

  background:
    linear-gradient(
      135deg,
      var(--primary),
      var(--primary2)
    );

  color:#fff;

  padding:18px 12px;

  font-size:14px;

  font-weight:800;

}

td{

  padding:16px 12px;

  border-bottom:1px solid #edf2ff;

  text-align:center;

  font-size:14px;

  background:#fff;

}

tbody tr:hover td{

  background:#f8fbff;

}

td.nama{

  text-align:left;
  font-weight:700;

}

input[type="radio"]{

  width:18px;
  height:18px;

  accent-color:var(--primary);

  cursor:pointer;

}

.info{

  margin-top:18px;

  font-size:14px;

  font-weight:700;

}

.loading{
  color:#2563eb;
}

.success{
  color:#16a34a;
}

.error{
  color:#dc2626;
}

.camera-wrap{

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;

}

video,
#previewFoto{

  width:100%;

  max-width:720px;

  aspect-ratio:16/9;

  border-radius:24px;

  background:#000;

  object-fit:cover;

  border:4px solid #fff;

  box-shadow:
    0 15px 40px rgba(15,23,42,.15);

}

.camera-actions{

  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;

}

.save-area{

  display:flex;
  justify-content:flex-end;

}

@media(max-width:768px){

  body{
    padding:14px;
  }

  .header{
    padding:24px;
    border-radius:22px;
  }

  .header h1{
    font-size:26px;
  }

  .card{
    padding:18px;
    border-radius:22px;
  }

  .menu-btn{
    width:100%;
    text-align:center;
  }

  .btn{
    width:100%;
  }

  .camera-actions{
    width:80%;
  }

}

video{
  min-height:260px;
}

</style>

</head>
<body>

<div class="container">

  <!-- MENU -->

  <div class="top-menu">

  <!-- LEFT MENU -->

  <div class="top-menu-left">

      <a
        href="input.html"
        class="menu-btn active"
      >
        Input Absensi
      </a>

      <a
        href="report.html"
        class="menu-btn"
      >
        Report
      </a>

    </div>

    <!-- RIGHT MENU -->

    <div class="top-menu-right">

      <button
        class="logout-btn"
        onclick="logoutApp()"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- HEADER -->

  <div class="header">

  <h1>INPUT ABSENSI</h1>


  <div id="headerUser"></div>

  </div>

  <!-- FILTER -->

  <div class="card">

    <div class="card-title">
      Form Absensi
    </div>

    <div class="form-grid">

      <!-- TANGGAL -->

      <div class="form-group">

        <label>Tanggal</label>

        <input
          type="date"
          id="tanggal"
          class="input-modern"
        >

      </div>

      <!-- KELAS -->

      <div class="form-group">

        <label>Kelas</label>

        <select id="kelas">

          <option value="">
            Pilih Kelas
          </option>

        </select>

      </div>

      <!-- MAPEL -->

      <div class="form-group">

        <label>Mata Pelajaran</label>

        <input
          type="text"
          id="mapel"
          class="input-modern"
          readonly
        >

      </div>

      <!-- GURU -->

      <div class="form-group">

        <label>Guru</label>

        <input
          type="text"
          id="guru"
          class="input-modern"
          readonly
        >

      </div>

      <!-- JAM MULAI -->

      <div class="form-group">

        <label>Jam Mulai</label>

        <select id="jamMulai">

          <option value="">
            Pilih Jam
          </option>

        </select>

      </div>

      <!-- JAM SELESAI -->

      <div class="form-group">

        <label>Jam Selesai</label>

        <select id="jamSelesai">

          <option value="">
            Pilih Jam
          </option>

        </select>

      </div>

    </div>

    <div class="action">

      <button
        id="btnTampilkan"
        class="btn btn-primary"
      >
        Tampilkan Siswa
      </button>

    </div>

    <div
      id="info"
      class="info"
    ></div>

  </div>

  <!-- TABEL -->

  <div class="card">

    <div class="card-title">
      Data Kehadiran Siswa
    </div>

    <div class="table-wrap">

      <table>

        <thead>

          <tr>

            <th>No</th>
            <th>NISN</th>
            <th>Nama Siswa</th>
            <th>H</th>
            <th>S</th>
            <th>I</th>
            <th>A</th>
            <th>C</th>

          </tr>

        </thead>

        <tbody id="tbodySiswa">

          <tr>

            <td colspan="8">
              Belum ada data
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

  <!-- FOTO -->

  <div class="card">

    <div class="card-title">
      Foto Kelas
    </div>

    <div class="camera-wrap">

      <video
        id="video"
        autoplay
        muted
        playsinline
      ></video>

      <canvas
        id="canvas"
        style="display:none;"
      ></canvas>

      <img
        id="previewFoto"
        style="display:none;"
      >

      <div class="camera-actions">

        <button
          id="btnAmbilFoto"
          class="btn btn-primary"
        >
          Ambil Foto
        </button>

       </div>

    </div>

  </div>

  <!-- SIMPAN -->

  <div class="save-area">

    <button
      id="btnSimpan"
      class="btn btn-primary"
    >
      Simpan Absensi
    </button>

  </div>

</div>

<script>

// ======================================
// API
// ======================================

const API_URL =
  "https://script.google.com/macros/s/AKfycbw_6HNjl9sS8PqlDvOwnlUCEc5ZOgBbEXjOT2KgGlMsoAWcUqOMSS6U5rrD6-CSmvs/exec";


/* =========================================
USER LOGIN
========================================= */

const userData =
JSON.parse(
  localStorage.getItem("userData")
);

console.log(userData);

/* =========================================
TAMPILKAN USER LOGIN
========================================= */

document.addEventListener(
  "DOMContentLoaded",
  ()=>{

    if(userData){

      // INPUT GURU
      const guru =
      document.getElementById("guru");

      if(guru){

        guru.value =
        userData.nama || "";

      }

      // INPUT MAPEL
      const mapel =
      document.getElementById("mapel");

      if(mapel){

        mapel.value =
        userData.mapel || "";

      }

      // HEADER USER
      const headerUser =
      document.getElementById("headerUser");

      if(headerUser){

        headerUser.innerHTML =
        `
        <div style="
          font-size:18px;
          font-weight:800;
        ">
          👤 ${userData.nama}
        </div>

        <div style="
          margin-top:4px;
          opacity:.9;
          font-size:14px;
        ">
          ${userData.role} • ${userData.mapel}
        </div>
        `;

      }

    }

  }
);

/* =========================================
AUTO FILL USER
========================================= */

document.addEventListener(
  "DOMContentLoaded",
  ()=>{

    if(userData){

      // AUTO GURU
      const guru =
      document.getElementById("guru");

      if(guru){

        guru.value =
        userData.nama || "";

        guru.readOnly = true;

      }

      // AUTO MAPEL
      const mapel =
      document.getElementById("mapel");

      if(mapel){

        mapel.value =
        userData.mapel || "";

        mapel.readOnly = true;

      }

    }

  }
);

const tbodySiswa =
  document.getElementById("tbodySiswa");

const elKelas =
  document.getElementById("kelas");

const elMapel =
  document.getElementById("mapel");

const elGuru =
  document.getElementById("guru");

const elJamMulai =
  document.getElementById("jamMulai");

const elJamSelesai =
  document.getElementById("jamSelesai");

const elInfo =
  document.getElementById("info");

const btnTampilkan =
  document.getElementById("btnTampilkan");

const btnSimpan =
  document.getElementById("btnSimpan");

const video =
  document.getElementById("video");

const canvas =
  document.getElementById("canvas");

const previewFoto =
  document.getElementById("previewFoto");

const btnAmbilFoto =
  document.getElementById("btnAmbilFoto");

const tanggalInput =
  document.getElementById("tanggal");


// ======================================
// GLOBAL
// ======================================

const now =
  new Date();

const yyyy =
  now.getFullYear();

const mm =
  String(
    now.getMonth() + 1
  ).padStart(2,"0");

const dd =
  String(
    now.getDate()
  ).padStart(2,"0");

const today =
  `${yyyy}-${mm}-${dd}`;

tanggalInput.value =
  today;

const tanggalHari =
document.getElementById("tanggalHari");

if(tanggalHari){

  tanggalHari.innerText =
  "Tanggal Hari Ini : " + today;

}

let JAM_DATA = [];
let JAM_TERISI = [];
let SISWA_DATA = [];

let IS_SAVING = false;

let FOTO_BASE64 = "";
let FOTO_URL = "";





// ======================================
// FETCH JSON
// ======================================

async function fetchJSON(
  url,
  options = {}
){

  try{

    const response =
      await fetch(url,{

        method:
          options.method || "GET",

        headers:{
          "Content-Type":
            "text/plain;charset=utf-8"
        },

        body:
          options.body || null,

        redirect:"follow"

      });

    const text =
      await response.text();

    if(!response.ok){

      throw new Error(
        "HTTP " + response.status
      );

    }

    if(!text){

      throw new Error(
        "Response kosong"
      );

    }

    let result;

    try{

      result =
        JSON.parse(text);

    }catch(err){

      throw new Error(
        "Response bukan JSON"
      );

    }

    return result;

  }catch(err){

    throw new Error(
      "Failed to fetch"
    );

  }

}

// ======================================
// HELPER
// ======================================

function formatJam(waktu){

  if(!waktu){

    return "";

  }

  const match =
    String(waktu)
    .match(/(\d{2}):(\d{2})/);

  if(match){

    return `${match[1]}:${match[2]}`;

  }

  return waktu;

}

function createOption(
  value,
  text
){

  const opt =
    document.createElement(
      "option"
    );

  opt.value =
    value;

  opt.textContent =
    text;

  return opt;

}

// ======================================
// VALIDASI
// ======================================

function validateTampilSiswa(){

  if(!elKelas.value){

    throw new Error(
      "Pilih kelas"
    );

  }

  if(!elMapel.value){

    throw new Error(
      "Pilih mapel"
    );

  }

  if(!elGuru.value){

    throw new Error(
      "Pilih guru"
    );

  }

}

function validateForm(){

  validateTampilSiswa();

  if(!elJamMulai.value){

    throw new Error(
      "Pilih jam mulai"
    );

  }

  if(!elJamSelesai.value){

    throw new Error(
      "Pilih jam selesai"
    );

  }

  for(

    let jam = Number(elJamMulai.value);
    jam <= Number(elJamSelesai.value);
    jam++

  ){

    if(
      JAM_TERISI.includes(jam)
    ){

      throw new Error(
        "Jam ke-" +
        jam +
        " sudah terisi"
      );

    }

  }

}

// ======================================
// JAM
// ======================================

function renderJamMulai(){

  elJamMulai.innerHTML =
    `
    <option value="">
      Pilih Jam
    </option>
    `;

  JAM_DATA.forEach(j=>{

    const noJam =
      Number(j.no_jam);

    const bentrok =
      JAM_TERISI.includes(
        noJam
      );

    const opt =
      createOption(

        noJam,

        bentrok
        ? `Jam ${noJam} • SUDAH TERISI`
        : `Jam ${noJam} • ${formatJam(j.mulai)}`

      );

    if(bentrok){

      opt.disabled = true;

    }

    elJamMulai.appendChild(opt);

  });

}

function updateJamSelesai(){

  elJamSelesai.innerHTML =
    `
    <option value="">
      Pilih Jam
    </option>
    `;

  if(
    elJamMulai.value === ""
  ){

    return;

  }

  const mulai =
    Number(
      elJamMulai.value
    );

  JAM_DATA.forEach(j=>{

    const noJam =
      Number(j.no_jam);

    if(noJam < mulai){

      return;

    }

    const bentrok =
      JAM_TERISI.includes(
        noJam
      );

    const opt =
      createOption(

        noJam,

        bentrok
        ? `Jam ${noJam} • SUDAH TERISI`
        : `Jam ${noJam} • ${formatJam(j.mulai)}`

      );

    if(bentrok){

      opt.disabled = true;

    }

    elJamSelesai.appendChild(opt);

  });

}

// ======================================
// LOAD CONFIG
// ======================================

async function loadConfig(){

  try{

    elInfo.innerHTML =
    `
    <span class="loading">
      Loading data...
    </span>
    `;

    const data =
    await fetchJSON(

      API_URL +
      "?action=getConfig"

    );

    if(!data.success){

      throw new Error(

        data.error ||
        "Gagal load data"

      );

    }

    // =====================================
    // LOAD KELAS
    // =====================================

    elKelas.innerHTML =
    `
    <option value="">
      Pilih Kelas
    </option>
    `;

    (data.kelas || [])
    .forEach(k=>{

      elKelas.appendChild(

        createOption(k,k)

      );

    });

    // =====================================
    // LOAD JAM
    // =====================================

    JAM_DATA =
    data.jamTersedia || [];

    renderJamMulai();

    // =====================================
    // SUCCESS
    // =====================================

    elInfo.innerHTML =
    `
    <span class="success">
      Data berhasil dimuat
    </span>
    `;

  }catch(err){

    elInfo.innerHTML =
    `
    <span class="error">
      ${err.message}
    </span>
    `;

  }

}

// ======================================
// LOAD JAM TERISI
// ======================================

async function loadJamTerisi(){

  try{

    if(!elKelas.value){

      return;

    }

    const data =
      await fetchJSON(

        API_URL +

        "?action=getJamTerisi" +

        "&tanggal=" +
        tanggalInput.value +

        "&kelas=" +
        encodeURIComponent(
          elKelas.value
        )

      );

    JAM_TERISI =
      (data.jamTerisi || [])
      .map(Number);

    renderJamMulai();

  }catch(err){

    console.error(err);

  }

}

// ======================================
// LOAD SISWA
// ======================================

async function loadSiswa(){

  try{

    tbodySiswa.innerHTML =
      `
      <tr>
        <td colspan="8">
          Loading siswa...
        </td>
      </tr>
      `;

    const data =
      await fetchJSON(

        API_URL +

        "?action=getSiswa" +

        "&kelas=" +

        encodeURIComponent(
          elKelas.value
        )

      );

    if(!data.success){

      throw new Error(
        data.error ||
        "Gagal load siswa"
      );

    }

    SISWA_DATA =
      data.data || [];

    renderSiswa();

  }catch(err){

    tbodySiswa.innerHTML =
      `
      <tr>
        <td colspan="8">
          ${err.message}
        </td>
      </tr>
      `;

  }

}

// ======================================
// TABLE
// ======================================

function renderRadio(
  nisn,
  status,
  checked = false
){

  return `
  <td>
    <input
      type="radio"
      name="status_${nisn}"
      value="${status}"
      ${checked ? "checked" : ""}
    >
  </td>
  `;

}

function renderSiswa(){

  if(!SISWA_DATA.length){

    tbodySiswa.innerHTML =
      `
      <tr>
        <td colspan="8">
          Tidak ada siswa
        </td>
      </tr>
      `;

    return;

  }

  tbodySiswa.innerHTML =
    SISWA_DATA
    .map((siswa,index)=>{

      return `

      <tr data-nisn="${siswa.nisn}">

        <td>${index + 1}</td>

        <td>${siswa.nisn}</td>

        <td class="nama">
          ${siswa.nama_siswa}
        </td>

        ${renderRadio(siswa.nisn,"H",true)}
        ${renderRadio(siswa.nisn,"S")}
        ${renderRadio(siswa.nisn,"I")}
        ${renderRadio(siswa.nisn,"A")}
        ${renderRadio(siswa.nisn,"C")}

      </tr>

      `;

    })
    .join("");

}

// ======================================
// KAMERA
// ======================================

async function bukaKamera(){

  try{

    // STOP kamera lama
    if(video.srcObject){

      video.srcObject
      .getTracks()
      .forEach(track=>track.stop());

    }

    // BUKA KAMERA
    const stream =
    await navigator.mediaDevices.getUserMedia({

      video:{

        facingMode:{
          ideal:"environment"
        },

        width:{
          ideal:1280
        },

        height:{
          ideal:720
        },

        aspectRatio:16/9

      },

      audio:false

    });

    video.srcObject = stream;

    video.onloadedmetadata = ()=>{

      video.play();

    };

  }catch(err){

    console.error(err);

    alert(
      "Kamera gagal dibuka.\n\n" +
      "Pastikan izin kamera diaktifkan."
    );

  }

}

// ======================================
// AMBIL FOTO LANDSCAPE
// ======================================

function ambilFoto(){

  if(!video.srcObject){

    throw new Error(
      "Kamera belum aktif"
    );

  }

  const ctx =
  canvas.getContext("2d");

  // LANDSCAPE
  canvas.width = 1280;
  canvas.height = 720;

  ctx.drawImage(

    video,

    0,
    0,

    canvas.width,
    canvas.height

  );

  FOTO_BASE64 =
  canvas.toDataURL(
    "image/jpeg",
    0.85
  );

  previewFoto.src =
  FOTO_BASE64;

  previewFoto.style.display =
  "block";

}

// ======================================
// UPLOAD FOTO
// ======================================

async function uploadFotoKelas(){

  if(!FOTO_BASE64){

    return "";

  }

  const result =
  await fetchJSON(

    API_URL,

    {

      method:"POST",

      body:JSON.stringify({

        action:"uploadFoto",

        data:{

          base64:FOTO_BASE64

        }

      })

    }

  );

  if(!result.success){

    throw new Error(

      result.error ||
      "Upload foto gagal"

    );

  }

  return (

    result.downloadUrl ||
    result.url ||
    ""

  );

}

// ======================================
// SIMPAN
// ======================================

async function simpanAbsensi(){

  try{

    if(IS_SAVING){

      return;

    }

    IS_SAVING = true;

    validateForm();

    btnSimpan.disabled =
      true;

    btnSimpan.innerText =
      "Menyimpan...";

    const rows =
      Array.from(

        tbodySiswa.querySelectorAll(
          "tr[data-nisn]"
        )

      );

    if(!rows.length){

      throw new Error(
        "Data siswa kosong"
      );

    }

    const detail = [];

    rows.forEach(row=>{

      const nisn =
        row.dataset.nisn;

      const checked =
        row.querySelector(
          'input[type="radio"]:checked'
        );

      const siswa =
        SISWA_DATA.find(
          s=>String(s.nisn) ===
          String(nisn)
        ) || {};

      detail.push({

        nisn:
          nisn,

        nama_siswa:
          siswa.nama_siswa || "",

        status:
          checked
          ? checked.value
          : "H"

      });

    });

    const payload = {

      tanggal:
        tanggalInput.value,

      kelas:
        elKelas.value,

      mapel:
        elMapel.value,

      guru:
        elGuru.value,

      jam_mulai:
        Number(
          elJamMulai.value
        ),

      jam_selesai:
        Number(
          elJamSelesai.value
        ),

      foto:
        FOTO_URL,

      detail:
        detail

    };

    const result =
      await fetchJSON(

        API_URL,

        {

          method:"POST",

          body:JSON.stringify({

            action:
              "simpanAbsensi",

            data:
              payload

          })

        }

      );

    if(!result.success){

      throw new Error(
        result.error ||
        "Gagal simpan"
      );

    }

    alert(
      "Absensi berhasil disimpan"
    );

    FOTO_BASE64 = "";
    FOTO_URL = "";

    previewFoto.style.display =
      "none";

    elJamMulai.value = "";
    elJamSelesai.value = "";

    tbodySiswa.innerHTML = `
    <tr>
      <td colspan="8">
        Belum ada data
      </td>
    </tr>
    `;

    await loadJamTerisi();

  }catch(err){

    alert(
      "ERROR:\n\n" +
      err.message
    );

  }finally{

    IS_SAVING = false;

    btnSimpan.disabled =
      false;

    btnSimpan.innerText =
      "Simpan Absensi";

      // AMBIL FOTO OTOMATIS
    ambilFoto();

    // UPLOAD FOTO OTOMATIS
    btnSimpan.innerText =
    "Uploading Foto...";

    FOTO_URL =
    await uploadFotoKelas();

    // LANJUT SIMPAN
    btnSimpan.innerText =
    "Menyimpan Absensi...";

  }

}

// ======================================
// EVENT
// ======================================

btnAmbilFoto.addEventListener(
  "click",

);


elJamMulai.addEventListener(

);

tanggalInput.addEventListener(

);

elKelas.addEventListener(

);

btnTampilkan.addEventListener(

    }finally{

      btnTampilkan.disabled =
        false;

      btnTampilkan.innerText =

);

btnSimpan.addEventListener(
  "click",

);
